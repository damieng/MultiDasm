cpu:
  name: "MOS 6502"
  endian: little

# Template placeholders:
#   n   = 8-bit value      → displayed as $XX
#   nn  = 16-bit value     → displayed as $XXXX
#   e   = relative offset  → displayed as target address $XXXX
#
# Flow types: jump, cond_branch, call, return, indirect

opcodes:
  # --- 0x ---
  0x00: ["BRK", 0]
  0x01: ["ORA (n,X)", 1]
  0x05: ["ORA n", 1]
  0x06: ["ASL n", 1]
  0x08: ["PHP", 0]
  0x09: ["ORA #n", 1]
  0x0A: ["ASL A", 0]
  0x0D: ["ORA nn", 2]
  0x0E: ["ASL nn", 2]
  # --- 1x ---
  0x10: ["BPL e", 1, cond_branch]
  0x11: ["ORA (n),Y", 1]
  0x15: ["ORA n,X", 1]
  0x16: ["ASL n,X", 1]
  0x18: ["CLC", 0]
  0x19: ["ORA nn,Y", 2]
  0x1D: ["ORA nn,X", 2]
  0x1E: ["ASL nn,X", 2]
  # --- 2x ---
  0x20: ["JSR nn", 2, call]
  0x21: ["AND (n,X)", 1]
  0x24: ["BIT n", 1]
  0x25: ["AND n", 1]
  0x26: ["ROL n", 1]
  0x28: ["PLP", 0]
  0x29: ["AND #n", 1]
  0x2A: ["ROL A", 0]
  0x2C: ["BIT nn", 2]
  0x2D: ["AND nn", 2]
  0x2E: ["ROL nn", 2]
  # --- 3x ---
  0x30: ["BMI e", 1, cond_branch]
  0x31: ["AND (n),Y", 1]
  0x35: ["AND n,X", 1]
  0x36: ["ROL n,X", 1]
  0x38: ["SEC", 0]
  0x39: ["AND nn,Y", 2]
  0x3D: ["AND nn,X", 2]
  0x3E: ["ROL nn,X", 2]
  # --- 4x ---
  0x40: ["RTI", 0, return]
  0x41: ["EOR (n,X)", 1]
  0x45: ["EOR n", 1]
  0x46: ["LSR n", 1]
  0x48: ["PHA", 0]
  0x49: ["EOR #n", 1]
  0x4A: ["LSR A", 0]
  0x4C: ["JMP nn", 2, jump]
  0x4D: ["EOR nn", 2]
  0x4E: ["LSR nn", 2]
  # --- 5x ---
  0x50: ["BVC e", 1, cond_branch]
  0x51: ["EOR (n),Y", 1]
  0x55: ["EOR n,X", 1]
  0x56: ["LSR n,X", 1]
  0x58: ["CLI", 0]
  0x59: ["EOR nn,Y", 2]
  0x5D: ["EOR nn,X", 2]
  0x5E: ["LSR nn,X", 2]
  # --- 6x ---
  0x60: ["RTS", 0, return]
  0x61: ["ADC (n,X)", 1]
  0x65: ["ADC n", 1]
  0x66: ["ROR n", 1]
  0x68: ["PLA", 0]
  0x69: ["ADC #n", 1]
  0x6A: ["ROR A", 0]
  0x6C: ["JMP (nn)", 2, indirect]
  0x6D: ["ADC nn", 2]
  0x6E: ["ROR nn", 2]
  # --- 7x ---
  0x70: ["BVS e", 1, cond_branch]
  0x71: ["ADC (n),Y", 1]
  0x75: ["ADC n,X", 1]
  0x76: ["ROR n,X", 1]
  0x78: ["SEI", 0]
  0x79: ["ADC nn,Y", 2]
  0x7D: ["ADC nn,X", 2]
  0x7E: ["ROR nn,X", 2]
  # --- 8x ---
  0x81: ["STA (n,X)", 1]
  0x84: ["STY n", 1]
  0x85: ["STA n", 1]
  0x86: ["STX n", 1]
  0x88: ["DEY", 0]
  0x8A: ["TXA", 0]
  0x8C: ["STY nn", 2]
  0x8D: ["STA nn", 2]
  0x8E: ["STX nn", 2]
  # --- 9x ---
  0x90: ["BCC e", 1, cond_branch]
  0x91: ["STA (n),Y", 1]
  0x94: ["STY n,X", 1]
  0x95: ["STA n,X", 1]
  0x96: ["STX n,Y", 1]
  0x98: ["TYA", 0]
  0x99: ["STA nn,Y", 2]
  0x9A: ["TXS", 0]
  0x9D: ["STA nn,X", 2]
  # --- Ax ---
  0xA0: ["LDY #n", 1]
  0xA1: ["LDA (n,X)", 1]
  0xA2: ["LDX #n", 1]
  0xA4: ["LDY n", 1]
  0xA5: ["LDA n", 1]
  0xA6: ["LDX n", 1]
  0xA8: ["TAY", 0]
  0xA9: ["LDA #n", 1]
  0xAA: ["TAX", 0]
  0xAC: ["LDY nn", 2]
  0xAD: ["LDA nn", 2]
  0xAE: ["LDX nn", 2]
  # --- Bx ---
  0xB0: ["BCS e", 1, cond_branch]
  0xB1: ["LDA (n),Y", 1]
  0xB4: ["LDY n,X", 1]
  0xB5: ["LDA n,X", 1]
  0xB6: ["LDX n,Y", 1]
  0xB8: ["CLV", 0]
  0xB9: ["LDA nn,Y", 2]
  0xBA: ["TSX", 0]
  0xBC: ["LDY nn,X", 2]
  0xBD: ["LDA nn,X", 2]
  0xBE: ["LDX nn,Y", 2]
  # --- Cx ---
  0xC0: ["CPY #n", 1]
  0xC1: ["CMP (n,X)", 1]
  0xC4: ["CPY n", 1]
  0xC5: ["CMP n", 1]
  0xC6: ["DEC n", 1]
  0xC8: ["INY", 0]
  0xC9: ["CMP #n", 1]
  0xCA: ["DEX", 0]
  0xCC: ["CPY nn", 2]
  0xCD: ["CMP nn", 2]
  0xCE: ["DEC nn", 2]
  # --- Dx ---
  0xD0: ["BNE e", 1, cond_branch]
  0xD1: ["CMP (n),Y", 1]
  0xD5: ["CMP n,X", 1]
  0xD6: ["DEC n,X", 1]
  0xD8: ["CLD", 0]
  0xD9: ["CMP nn,Y", 2]
  0xDD: ["CMP nn,X", 2]
  0xDE: ["DEC nn,X", 2]
  # --- Ex ---
  0xE0: ["CPX #n", 1]
  0xE1: ["SBC (n,X)", 1]
  0xE4: ["CPX n", 1]
  0xE5: ["SBC n", 1]
  0xE6: ["INC n", 1]
  0xE8: ["INX", 0]
  0xE9: ["SBC #n", 1]
  0xEA: ["NOP", 0]
  0xEC: ["CPX nn", 2]
  0xED: ["SBC nn", 2]
  0xEE: ["INC nn", 2]
  # --- Fx ---
  0xF0: ["BEQ e", 1, cond_branch]
  0xF1: ["SBC (n),Y", 1]
  0xF5: ["SBC n,X", 1]
  0xF6: ["INC n,X", 1]
  0xF8: ["SED", 0]
  0xF9: ["SBC nn,Y", 2]
  0xFD: ["SBC nn,X", 2]
  0xFE: ["INC nn,X", 2]
